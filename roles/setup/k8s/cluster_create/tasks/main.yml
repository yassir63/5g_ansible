---
- name: START_K8S_CREATE
  ansible.builtin.meta: noop

- name: Normalize booleans for current host
  ansible.builtin.set_fact:
    fhi72: "{{ fhi72 | default(false) | bool }}"
    bridge_enabled: "{{ bridge_enabled | default(false) | bool }}"
    monitoring_enabled: "{{ monitoring_enabled | default(false) | bool }}"
    f3_ran: "{{ f3_ran | default(false) | bool }}"


# === CLEANUP PHASE ============================================================

# FIX: stop kubelet and containerd BEFORE kubeadm reset — otherwise static pods
#      (apiserver, controller-manager) keep running and hold ports 6443/10259,
#      causing kubeadm init to fail with [ERROR Port-6443] / [ERROR Port-10259].
#      The original role deleted /var/lib/kubelet first, which prevented kubelet
#      from cleanly terminating its pods before reset.
- name: Stop kubelet before reset
  ansible.builtin.systemd:
    name: kubelet
    state: stopped
  become: true
  ignore_errors: true

# FIX: kube-apiserver and other static pod processes can survive as orphan processes
#      outside containerd (crictl ps returns empty) after kubelet stops — they hold
#      ports 6443/10259 and block kubeadm init. Kill them directly by name.
- name: Kill orphan static pod processes (apiserver, controller-manager, scheduler, etcd)
  ansible.builtin.shell: |
    for proc in kube-apiserver kube-controller-manager kube-scheduler etcd; do
      pkill -9 -x "$proc" 2>/dev/null && echo "Killed $proc" || true
    done
  become: true
  ignore_errors: true

- name: Wait for ports 6443 and 10259 to be released (max 30s)
  ansible.builtin.shell: |
    for port in 6443 10259; do
      for i in $(seq 1 15); do
        ss -tlnp | grep -q ":${port} " || break
        echo "Port $port still in use ($i/15), waiting..."
        sleep 2
      done
      if ss -tlnp | grep -q ":${port} "; then
        echo "ERROR: port $port still held after 30s"
        ss -tlnp | grep ":${port} "
        exit 1
      fi
    done
  become: true
  changed_when: false

- name: Reset Kubernetes (safe)
  ansible.builtin.command: kubeadm reset -f
  ignore_errors: true
  become: true

- name: Remove old Kubernetes and CNI directories (safe)
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /etc/kubernetes
    - /var/lib/etcd
    - /var/lib/kubelet
    - /etc/cni
    - /opt/cni
    - /var/lib/cni
    - /run/flannel
  become: true
  ignore_errors: true

# FIX: removed tmpfs remount block — pre_k8s already mounted the real disk (ext4)
#      on /var/lib/containerd. Re-mounting a tmpfs on top was creating a stacked
#      mount (ext4 + tmpfs), causing findmnt to return both fstypes and kubelet
#      to still see InvalidDiskCapacity on the image filesystem.
#
#      kubeadm reset -f can itself re-add a tmpfs on /var/lib/containerd.
#      Strip all stacked mounts after reset, then remount the real disk from
#      inventory so containerd starts on a clean single ext4 mount.
- name: Unmount all stacked mounts on /var/lib/containerd after reset
  ansible.builtin.shell: |
    # umount in a loop until nothing is mounted there anymore
    for i in $(seq 1 5); do
      findmnt /var/lib/containerd &>/dev/null || break
      umount /var/lib/containerd 2>/dev/null || umount -f /var/lib/containerd 2>/dev/null || break
    done
    # Confirm clean state
    findmnt /var/lib/containerd && echo "STILL_MOUNTED" || echo "CLEAN"
  register: unmount_result
  become: true
  changed_when: false

- name: Recreate /var/lib/containerd directory after cleanup
  ansible.builtin.file:
    path: /var/lib/containerd
    state: directory
    mode: '0755'
  become: true

# FIX: detect whether the disk is already mounted elsewhere (same logic as pre_k8s)
#      so the remount strategy works regardless of what prior roles have done.
- name: Detect existing mountpoint for storage device after reset
  ansible.builtin.shell: |
    findmnt -n -o TARGET /dev/{{ storage }} 2>/dev/null || echo "none"
  register: storage_mount_after_reset
  changed_when: false
  become: true

- name: "[bind] Remount via bind after reset (disk already mounted elsewhere)"
  ansible.builtin.mount:
    path: /var/lib/containerd
    src: "{{ storage_mount_after_reset.stdout }}/containerd"
    fstype: none
    opts: bind
    state: mounted
  become: true
  when:
    - storage_mount_after_reset.stdout != "none"
    - storage_mount_after_reset.stdout != "/var/lib/containerd"

- name: "[direct] Remount disk directly after reset"
  ansible.builtin.mount:
    path: /var/lib/containerd
    src: "/dev/{{ storage }}"
    fstype: ext4
    opts: defaults,noatime
    state: mounted
  become: true
  when: storage_mount_after_reset.stdout == "none"

- name: Assert /var/lib/containerd is on a real FS before kubeadm init
  ansible.builtin.shell: |
    fstype=$(findmnt -n -o FSTYPE /var/lib/containerd 2>/dev/null || echo "NOT_MOUNTED")
    # Only take the first line — guard against stacked mounts returning multiple lines
    fstype=$(echo "$fstype" | head -1)
    echo "fstype=$fstype"
    case "$fstype" in
      ext4|xfs|btrfs) exit 0 ;;
      *) echo "ERROR: /var/lib/containerd is on '$fstype', expected ext4/xfs/btrfs"; exit 1 ;;
    esac
  become: true
  changed_when: false

- name: Restart containerd
  ansible.builtin.systemd:
    name: containerd
    state: restarted
  become: true

- name: Wait 5 seconds for containerd to settle
  ansible.builtin.pause:
    seconds: 5
# END FIX

# === KUBEADM INIT =============================================================
- name: Upload kubeadm config to master node
  ansible.builtin.template:
    src: kubeadm-config.yaml.j2
    dest: /root/kubeadm-config.yaml
  become: true

- name: Initialize Kubernetes cluster
  ansible.builtin.command: kubeadm init --config /root/kubeadm-config.yaml
  register: kubeadm_init
  become: true

# FIX: kubeadm init recreates /var/lib/kubelet with a fresh config.yaml that
#      does not contain the evictionHard/imageGC settings written by pre_k8s
#      (pre_k8s ran before the cleanup which deleted /var/lib/kubelet).
#      Re-apply the storage eviction settings here via lineinfile so they are
#      merged into the kubeadm-generated config without overwriting it entirely.
- name: Remove rootDir from kubeadm-generated kubelet config if present
  ansible.builtin.lineinfile:
    path: /var/lib/kubelet/config.yaml
    regexp: '^\s*rootDir:'
    state: absent
  become: true

- name: Patch evictionHard into kubeadm-generated kubelet config
  ansible.builtin.blockinfile:
    path: /var/lib/kubelet/config.yaml
    block: |
      evictionHard:
        nodefs.available: "10%"
        imagefs.available: "10%"
      imageGCHighThresholdPercent: 85
      imageGCLowThresholdPercent: 80
    marker: "# {mark} KUBELET STORAGE PATCH"
  become: true

- name: Restart kubelet to apply eviction config
  ansible.builtin.systemd:
    name: kubelet
    state: restarted
    daemon_reload: yes
  become: true

# === KUBE-PROXY ================================================
- name: Wait until at least one kube-proxy pod exists
  ansible.builtin.shell: |
    until kubectl --kubeconfig=/etc/kubernetes/admin.conf -n kube-system get pod -l k8s-app=kube-proxy --no-headers 2>/dev/null | grep .; do
      echo "Waiting for kube-proxy pod to appear..."
      sleep 5
    done
  become: true

- name: Restart kube-proxy pods to reload config.conf (if any exist)
  ansible.builtin.shell: |
    kubectl --kubeconfig=/etc/kubernetes/admin.conf -n kube-system delete pod -l k8s-app=kube-proxy --ignore-not-found
  become: true

- name: Wait until kube-proxy pods are Running
  ansible.builtin.shell: |
    kubectl --kubeconfig=/etc/kubernetes/admin.conf -n kube-system wait pod -l k8s-app=kube-proxy --for=condition=Ready --timeout=180s || true
  become: true

# ---- Sanitize kubelet extra args: remove deprecated CNI flags if present ----
- name: Check for deprecated kubelet flags in /etc/default/kubelet
  ansible.builtin.shell: |
    if [ -f /etc/default/kubelet ]; then
      if grep -Eq -- '--network-plugin|--cni-bin-dir|--cni-conf-dir' /etc/default/kubelet; then
        echo "DEPRECATED_FOUND"
      else
        echo "CLEAN"
      fi
    else
      echo "MISSING"
    fi
  register: kubelet_extra_check
  changed_when: false
  become: true

- name: Backup existing /etc/default/kubelet if deprecated flags found
  ansible.builtin.copy:
    src: /etc/default/kubelet
    dest: /etc/default/kubelet.bak_{{ ansible_date_time.epoch }}
    remote_src: yes
  when: kubelet_extra_check.stdout == "DEPRECATED_FOUND"
  become: true

- name: Sanitize /etc/default/kubelet (write only the resolvConf) if deprecated flags found or file missing
  ansible.builtin.copy:
    dest: /etc/default/kubelet
    content: 'KUBELET_EXTRA_ARGS="--resolv-conf=/run/systemd/resolve/resolv.conf"'
    mode: '0644'
  when: kubelet_extra_check.stdout != "CLEAN"
  become: true

- name: Ensure kubelet systemd sees the change (daemon-reload)
  ansible.builtin.systemd:
    daemon_reload: yes
  become: true

- name: Restart kubelet if we changed the file
  ansible.builtin.systemd:
    name: kubelet
    state: restarted
  when: kubelet_extra_check.stdout != "CLEAN"
  become: true

# === FIX: Force kubelet to use correct resolv.conf ============================
- name: Ensure kubelet uses systemd-resolved DNS
  ansible.builtin.copy:
    dest: /etc/default/kubelet
    content: |
      KUBELET_EXTRA_ARGS=--resolv-conf=/run/systemd/resolve/resolv.conf
    mode: "0644"
  become: true


- name: Restart kubelet to apply DNS config
  ansible.builtin.systemd:
    name: kubelet
    state: restarted
  become: true

- name: Enable cluster CIDR allocation in kube-controller-manager
  ansible.builtin.lineinfile:
    path: /etc/kubernetes/manifests/kube-controller-manager.yaml
    regexp: "{{ item.regexp }}"
    line: "{{ item.line }}"
  loop:
    - { regexp: '^\s*- --allocate-node-cidrs=', line: '    - --allocate-node-cidrs=true' }
    - { regexp: '^\s*- --cluster-cidr=', line: '    - --cluster-cidr=10.244.0.0/16' }
  become: true

- name: Create .kube directory in user's home
  file:
    path: "{{ ansible_env.HOME }}/.kube"
    state: directory
    mode: '0700'

- name: Copy admin.conf to kube config
  copy:
    src: /etc/kubernetes/admin.conf
    dest: "{{ ansible_env.HOME }}/.kube/config"
    remote_src: yes
    mode: '0600'
  become: true

# === TOOLING =======================================
- name: Ensure Python tooling is available
  ansible.builtin.apt:
    name:
      - python3-venv
      - python3-pip
      - python3-setuptools
      - curl
    state: present
    update_cache: yes
  become: true

- name: Create Python venv for Kubernetes tasks (idempotent)
  ansible.builtin.command: python3 -m venv /opt/ansible-venv
  args:
    creates: /opt/ansible-venv/bin/activate
  become: true

- name: Upgrade ensurepip in venv
  ansible.builtin.command: /opt/ansible-venv/bin/python -m ensurepip --upgrade
  become: true

- name: Bootstrap pip, setuptools and wheel in venv
  ansible.builtin.command: /opt/ansible-venv/bin/pip install --upgrade pip setuptools wheel
  become: true

- name: Install kubernetes Python module in venv
  ansible.builtin.command: /opt/ansible-venv/bin/pip install --upgrade kubernetes
  become: true

- name: Force Ansible to use venv Python
  ansible.builtin.set_fact:
    ansible_python_interpreter: /opt/ansible-venv/bin/python

- name: Install Helm if missing
  ansible.builtin.shell: |
    curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
  args:
    creates: /usr/local/bin/helm
  become: true

# === FLANNEL (CNI) ============================================================
- name: Ensure CNI directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - /etc/cni/net.d
    - /opt/cni/bin
    - /var/lib/cni
  become: true

# --- CLEAN old/conflicting CNI config files (Multus/old Flannel) -------------
- name: Clean old or conflicting CNI configs
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /etc/cni/net.d/00-multus.conf
    - /etc/cni/net.d/00-multus.conf.bak
    - /etc/cni/net.d/10-flannel.conf
    - /etc/cni/net.d/10-flannel.conf~
  ignore_errors: yes
  become: true

- name: Deploy Flannel CNI conflist
  ansible.builtin.copy:
    dest: /etc/cni/net.d/10-flannel.conflist
    mode: '0644'
    content: |
      {
        "name": "cbr0",
        "cniVersion": "0.3.1",
        "plugins": [
          {
            "type": "flannel",
            "delegate": {
              "hairpinMode": true,
              "isDefaultGateway": true
            }
          },
          {
            "type": "portmap",
            "capabilities": {
              "portMappings": true
            }
          }
        ]
      }
  become: true

- name: Download CNI plugins tarball via curl (for any Ubuntu 22.04+)
  ansible.builtin.shell: |
    curl -fsSL -o /tmp/cni-plugins.tgz https://github.com/containernetworking/plugins/releases/download/v1.5.1/cni-plugins-linux-amd64-v1.5.1.tgz
  args:
    creates: /tmp/cni-plugins.tgz
  become: true

- name: Extract CNI plugins
  ansible.builtin.unarchive:
    src: /tmp/cni-plugins.tgz
    dest: /opt/cni/bin
    remote_src: true
  become: true

- name: Ensure kube-flannel namespace exists
  kubernetes.core.k8s:
    definition:
      apiVersion: v1
      kind: Namespace
      metadata:
        name: kube-flannel
        labels:
          pod-security.kubernetes.io/enforce: privileged
    state: present
    kubeconfig: /etc/kubernetes/admin.conf

- name: Add Flannel Helm repo
  kubernetes.core.helm_repository:
    name: flannel
    repo_url: https://flannel-io.github.io/flannel/
    kubeconfig: /etc/kubernetes/admin.conf

- name: Install Flannel via Helm
  kubernetes.core.helm:
    name: flannel
    chart_ref: flannel/flannel
    release_namespace: kube-flannel
    state: present
    wait: true
    kubeconfig: /etc/kubernetes/admin.conf
    values:
      podCidr: "10.244.0.0/16"
      flannel:
        iface: "{{ hostvars[inventory_hostname].nic_interface | default('eth0') }}"

# === FIX CNI INITIALIZATION ===================================================
- name: Restart containerd and kubelet to reload CNI
  ansible.builtin.systemd:
    name: "{{ item }}"
    state: restarted
  loop:
    - containerd
    - kubelet
  become: true

- name: Wait until node is Ready
  ansible.builtin.shell: |
    kubectl wait node $(hostname) --for=condition=Ready --timeout=180s
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  register: wait_ready
  retries: 3
  delay: 10
  until: wait_ready.rc == 0
  become: true

# === COREDNS & FINALIZATION ===================================================
- name: Wait for CoreDNS pods to be Ready
  ansible.builtin.shell: |
    kubectl wait -n kube-system --for=condition=Ready pod -l k8s-app=kube-dns --timeout=300s
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  become: true

- name: Test CoreDNS resolution using a non-interactive busybox pod
  become: true
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  ansible.builtin.shell: |
    kubectl run dns-test --image=busybox:1.36 --restart=Never --command -- \
      sh -c 'nslookup kubernetes.default.svc.cluster.local' || true
        echo "Cleaning up test pods..."
    kubectl delete pod dns-test --ignore-not-found
  changed_when: false

# === JOIN COMMAND =============================================================
- name: Generate join command
  ansible.builtin.shell: kubeadm token create --print-join-command
  register: join_cmd
  delegate_to: "{{ groups['core_node'][0] }}"
  run_once: true

# Do not save file on /tmp/ in localhost since multi-users, use HOME instead
- name: Save join command locally
  ansible.builtin.copy:
    content: "{{ join_cmd.stdout }}"
    dest: .kubeadm_join_command.txt
    mode: '0644'
  delegate_to: localhost
  run_once: true
