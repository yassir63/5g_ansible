---
# To avoid Pod eviction issues on live and persistent systems

# --- Detect if running from a live Ubuntu image ---
- name: Detect live Ubuntu system
  ansible.builtin.shell: |
    grep -q "boot=live" /proc/cmdline && echo "live" || echo "persistent"
  register: live_image_check
  changed_when: false
  become: true

# --- Handle containerd storage for live system ---
- name: Create /var/lib/containerd tmpfs for live system
  block:
    - name: Create containerd directory
      ansible.builtin.file:
        path: /var/lib/containerd
        state: directory
        mode: '0755'

    # FIX: was: mount tmpfs 50G — tmpfs has no real backing device, statfs() returns
    #      0 blocks → kubelet reports InvalidDiskCapacity.
    #      Now: mount the real disk partition from inventory (ext4) so kubelet can
    #      measure imageFs capacity correctly.
    - name: Check if /var/lib/containerd is already mounted
      ansible.builtin.command: mountpoint -q /var/lib/containerd
      register: containerd_already_mounted
      ignore_errors: true
      changed_when: false

    - name: Mount real disk on /var/lib/containerd (fix InvalidDiskCapacity)
      ansible.builtin.mount:
        path: /var/lib/containerd
        src: "/dev/{{ storage }}"
        fstype: ext4
        opts: defaults,noatime
        state: mounted
      when: containerd_already_mounted.rc != 0

  when: live_image_check.stdout == "live" and (ran_node_name != core_node_name)
  become: true
  tags: ['live-fix']

- name: Mount tmpfs for K8s storage (containerd + kubelet)
  block:
    - name: Ensure directories exist
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: '0755'
      loop:
        - /var/lib/containerd
        - /var/lib/kubelet

    # FIX: replace tmpfs with real disk for /var/lib/containerd
    - name: Check if /var/lib/containerd is already mounted
      ansible.builtin.command: mountpoint -q /var/lib/containerd
      register: containerd_already_mounted_shared
      ignore_errors: true
      changed_when: false

    - name: Mount real disk on /var/lib/containerd (fix InvalidDiskCapacity)
      ansible.builtin.mount:
        path: /var/lib/containerd
        src: "/dev/{{ storage }}"
        fstype: ext4
        opts: defaults,noatime
        state: mounted
      when: containerd_already_mounted_shared.rc != 0
    
    # kubelet on tmpfs is fine — kubelet workdir does not need statfs capacity reporting
    - name: Mount tmpfs on /var/lib/kubelet (5G)
      ansible.builtin.mount:
        path: /var/lib/kubelet
        src: tmpfs
        fstype: tmpfs
        opts: size=5G
        state: mounted
  when: live_image_check.stdout == "live" and (ran_node_name == core_node_name)
  become: true

# --- Handle containerd storage for persistent system ---
- name: Ensure storage device exists
  ansible.builtin.stat:
    path: "/dev/{{ storage }}"
  register: storage_device
  become: true

- name: Fail if storage device does not exist
  ansible.builtin.fail:
    msg: "Storage device /dev/{{ storage }} does not exist"
  when: not storage_device.stat.exists

- name: Create containerd mount point
  ansible.builtin.file:
    path: /var/lib/containerd
    state: directory
    mode: '0755'

- name: Mount persistent storage for containerd
  ansible.builtin.mount:
    path: /var/lib/containerd
    src: "/dev/{{ storage }}"
    fstype: ext4
    state: mounted
  # Only mount if not a live-boot system
  when: live_image_check.stdout != "live"
  become: true

# --- Kubelet preparation ---
- name: Ensure kubelet base directory exists
  ansible.builtin.file:
    path: /var/lib/kubelet
    state: directory
    mode: '0755'

- name: Check if kubelet config exists
  ansible.builtin.stat:
    path: /var/lib/kubelet/config.yaml
  register: kubelet_cfg

- name: Backup existing kubelet config if present
  ansible.builtin.copy:
    src: /var/lib/kubelet/config.yaml
    dest: /var/lib/kubelet/config.yaml.bak.{{ ansible_date_time.epoch }}
    remote_src: true
  when: kubelet_cfg.stat.exists

- name: Ensure kubelet config exists
  ansible.builtin.file:
    path: /var/lib/kubelet/config.yaml
    state: touch
    mode: '0644'

- name: Patch kubelet config (Unified)
  ansible.builtin.blockinfile:
    path: /var/lib/kubelet/config.yaml
    block: |
      # FIX: removed rootDir — rootDir is kubelet's own working directory
      #      (default: /var/lib/kubelet). Pointing it to /var/lib/containerd was
      #      mixing both workspaces. kubelet discovers imageFs automatically via
      #      containerd CRI stats once containerd root is on a real FS.
      evictionHard:
        nodefs.available: "{{ '2%' if (core_node_name == ran_node_name) else '10%' }}"
        imagefs.available: "{{ '2%' if (core_node_name == ran_node_name) else '10%' }}"
      {% if core_node_name == ran_node_name %}
      evictionMinimumReclaim:
        nodefs.available: "500Mi"
      {% endif %}
      # FIX: added imageGC thresholds — without these, kubelet uses defaults (85%/80%)
      #      but they are not explicit, causing unpredictable GC behavior on liveboot nodes.
      imageGCHighThresholdPercent: 85
      imageGCLowThresholdPercent: 80
      # END FIX
    marker: "# {mark} KUBELET STORAGE PATCH"
  become: true

# --- Restart services only if present ---
- name: Check if containerd service exists
  ansible.builtin.shell: systemctl list-unit-files | grep -q '^containerd\.service'
  register: containerd_service
  changed_when: false
  failed_when: false

- name: Reload systemd and restart containerd
  ansible.builtin.systemd:
    name: containerd
    state: restarted
    enabled: yes
    daemon_reload: yes
  when: containerd_service.rc == 0

- name: Check if kubelet service exists
  ansible.builtin.shell: systemctl list-unit-files | grep -q '^kubelet\.service'
  register: kubelet_service
  changed_when: false
  failed_when: false

- name: Restart kubelet
  ansible.builtin.systemd:
    name: kubelet
    state: restarted
    enabled: yes
    daemon_reload: yes
  when: kubelet_service.rc == 0

# --- Validation of disk pressure fix ---
- name: Check /var/lib/containerd mount
  ansible.builtin.shell: mount | grep /var/lib/containerd || true
  register: containerd_mount
  changed_when: false
  become: true

- name: Show /var/lib/containerd mount status
  ansible.builtin.debug:
    msg: "{{ containerd_mount.stdout if containerd_mount.stdout else 'not mounted' }}"

# FIX: replaced old validation (checked for rootDir string) with fstype guard —
#      fail immediately if containerd root is still on a virtual FS.
- name: Fail if /var/lib/containerd is on a virtual filesystem
  ansible.builtin.fail:
    msg: >
      /var/lib/containerd is on '{{ containerd_mount.stdout }}' — kubelet will report
      InvalidDiskCapacity. Ensure /dev/{{ storage }} is ext4-formatted and mounted.
  when: >
    containerd_mount.stdout == "NOT_MOUNTED" or
    containerd_mount.stdout is search('tmpfs|squashfs|ramfs')

- name: Verify kubelet evictionHard and imageGC
  ansible.builtin.shell: |
    grep -A 3 'evictionHard' /var/lib/kubelet/config.yaml || true
    grep 'rootDir' /var/lib/kubelet/config.yaml && echo "WARNING: rootDir still present" || echo "OK: rootDir absent"
    grep 'imageGC' /var/lib/kubelet/config.yaml || true
  register: kubelet_config_check
  changed_when: false
  become: true

- name: Show kubelet config check
  ansible.builtin.debug:
    msg: "{{ kubelet_config_check.stdout }}"

- name: Fail if disk pressure patch not applied
  ansible.builtin.fail:
    msg: "Disk pressure fix not applied: check /var/lib/containerd mount or kubelet config"
  when: >
    containerd_mount.stdout == "" or
    "rootDir: /var/lib/containerd" not in kubelet_config_check.stdout

