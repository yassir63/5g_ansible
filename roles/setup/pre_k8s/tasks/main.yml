---
# To avoid Pod eviction issues on live and persistent systems

# --- Detect if running from a live Ubuntu image ---
- name: Detect live Ubuntu system
  ansible.builtin.shell: |
    grep -q "boot=live" /proc/cmdline && echo "live" || echo "persistent"
  register: live_image_check
  changed_when: false
  become: true

# --- Handle containerd storage for live system ---
- name: Create /var/lib/containerd tmpfs for live system
  block:
    - name: Create containerd directory
      ansible.builtin.file:
        path: /var/lib/containerd
        state: directory
        mode: '0755'

    - name: Check current fstype on /var/lib/containerd
      ansible.builtin.shell: |
        findmnt -n -o FSTYPE /var/lib/containerd 2>/dev/null || echo "none"
      register: containerd_current_fstype
      changed_when: false

    # FIX: purge all /var/lib/containerd entries from fstab — previous runs of
    #      ansible.builtin.mount wrote both tmpfs and ext4 entries here; systemd
    #      replayed both at containerd restart creating a stacked mount → InvalidDiskCapacity.
    - name: Remove all /var/lib/containerd entries from fstab
      ansible.builtin.lineinfile:
        path: /etc/fstab
        regexp: '.*/var/lib/containerd.*'
        state: absent
    # END FIX

    - name: Stop containerd before unmounting
      ansible.builtin.systemd:
        name: containerd
        state: stopped
      when: containerd_current_fstype.stdout not in ['none', 'ext4']
      ignore_errors: true

    # FIX: unmount all stacked mounts via shell loop — avoids ansible.builtin.mount
    #      state: unmounted which would write a new fstab entry.
    - name: Unmount all stacked mounts on /var/lib/containerd
      ansible.builtin.shell: |
        for i in $(seq 1 10); do
          findmnt /var/lib/containerd &>/dev/null || break
          umount /var/lib/containerd 2>/dev/null || umount -l /var/lib/containerd 2>/dev/null || break
          sleep 1
        done
      when: containerd_current_fstype.stdout != "none"
    # END FIX

    # Detect whether /dev/{{ storage }} is already mounted elsewhere on this node
    - name: Detect existing mountpoint for /dev/{{ storage }}
      ansible.builtin.shell: |
        findmnt -n -o TARGET /dev/{{ storage }} 2>/dev/null || echo "none"
      register: storage_existing_mount
      changed_when: false

    # Strategy A: disk already mounted elsewhere → bind-mount a subdir
    - name: "[bind] Create containerd subdir under existing mountpoint"
      ansible.builtin.file:
        path: "{{ storage_existing_mount.stdout | trim }}/containerd"
        state: directory
        mode: '0755'
      when:
        - containerd_current_fstype.stdout | trim != "ext4"
        - storage_existing_mount.stdout | trim != "none"
        - storage_existing_mount.stdout | trim != "/var/lib/containerd"

    # FIX: use shell mount --bind instead of ansible.builtin.mount to avoid fstab write
    - name: "[bind] Bind-mount {{ storage_existing_mount.stdout | trim }}/containerd onto /var/lib/containerd"
      ansible.builtin.shell: |
        mount --bind "{{ storage_existing_mount.stdout | trim }}/containerd" /var/lib/containerd
      when:
        - containerd_current_fstype.stdout | trim != "ext4"
        - storage_existing_mount.stdout | trim != "none"
        - storage_existing_mount.stdout | trim != "/var/lib/containerd"

    # Strategy B: disk not mounted anywhere → mount directly
    # FIX: use shell mount instead of ansible.builtin.mount to avoid fstab write
    - name: "[direct] Mount /dev/{{ storage }} onto /var/lib/containerd"
      ansible.builtin.shell: |
        mount -t ext4 -o defaults,noatime /dev/{{ storage }} /var/lib/containerd
      when:
        - containerd_current_fstype.stdout | trim != "ext4"
        - storage_existing_mount.stdout | trim == "none"
    # END FIX

    # kubelet on tmpfs is acceptable — kubelet workdir does not need statfs capacity
    - name: Ensure /var/lib/kubelet directory exists
      ansible.builtin.file:
        path: /var/lib/kubelet
        state: directory
        mode: '0755'
      when: ran_node_name == core_node_name

    - name: Mount tmpfs on /var/lib/kubelet (5G) — shared node only
      ansible.builtin.mount:
        path: /var/lib/kubelet
        src: tmpfs
        fstype: tmpfs
        opts: size=5G
        state: mounted
      when: ran_node_name == core_node_name

  when: live_image_check.stdout == "live"
  become: true
  tags: ['live-fix']

# --- Handle containerd storage for persistent system ---
- name: Ensure storage device exists
  ansible.builtin.stat:
    path: "/dev/{{ storage }}"
  register: storage_device
  become: true

- name: Fail if storage device does not exist
  ansible.builtin.fail:
    msg: "Storage device /dev/{{ storage }} does not exist"
  when: not storage_device.stat.exists

- name: Create containerd mount point
  ansible.builtin.file:
    path: /var/lib/containerd
    state: directory
    mode: '0755'

- name: Mount persistent storage for containerd
  ansible.builtin.mount:
    path: /var/lib/containerd
    src: "/dev/{{ storage }}"
    fstype: ext4
    state: mounted
  when: live_image_check.stdout != "live"
  become: true

# --- Kubelet preparation ---
- name: Ensure kubelet base directory exists
  ansible.builtin.file:
    path: /var/lib/kubelet
    state: directory
    mode: '0755'

- name: Check if kubelet config exists
  ansible.builtin.stat:
    path: /var/lib/kubelet/config.yaml
  register: kubelet_cfg

- name: Backup existing kubelet config if present
  ansible.builtin.copy:
    src: /var/lib/kubelet/config.yaml
    dest: /var/lib/kubelet/config.yaml.bak.{{ ansible_date_time.epoch }}
    remote_src: true
  when: kubelet_cfg.stat.exists

- name: Ensure kubelet config exists
  ansible.builtin.file:
    path: /var/lib/kubelet/config.yaml
    state: touch
    mode: '0644'

# FIX: remove any existing rootDir line before patching — blockinfile only adds
#      its own block, it does not clean up lines written by previous role runs
#      (e.g. k8s_cpu_tuning). rootDir must be absent: it is kubelet's workdir
#      (default /var/lib/kubelet) and must NOT point to /var/lib/containerd.
- name: Remove rootDir from kubelet config if present
  ansible.builtin.lineinfile:
    path: /var/lib/kubelet/config.yaml
    regexp: '^\s*rootDir:'
    state: absent
  become: true

- name: Remove stale FIX comment lines previously written into kubelet config by blockinfile
  ansible.builtin.lineinfile:
    path: /var/lib/kubelet/config.yaml
    regexp: '^\s*#\s*(FIX:|END FIX)'
    state: absent
  become: true
# END FIX

- name: Patch kubelet config (Unified)
  ansible.builtin.blockinfile:
    path: /var/lib/kubelet/config.yaml
    block: |
      evictionHard:
        nodefs.available: "{{ '2%' if (core_node_name == ran_node_name) else '10%' }}"
        imagefs.available: "{{ '2%' if (core_node_name == ran_node_name) else '10%' }}"
      {% if core_node_name == ran_node_name %}
      evictionMinimumReclaim:
        nodefs.available: "500Mi"
      {% endif %}
      imageGCHighThresholdPercent: 85
      imageGCLowThresholdPercent: 80
    marker: "# {mark} KUBELET STORAGE PATCH"
  become: true


# --- Restart services only if present ---
- name: Check if containerd service exists
  ansible.builtin.shell: systemctl list-unit-files | grep -q '^containerd\.service'
  register: containerd_service
  changed_when: false
  failed_when: false

- name: Reload systemd and restart containerd
  ansible.builtin.systemd:
    name: containerd
    state: restarted
    enabled: yes
    daemon_reload: yes
  when: containerd_service.rc == 0

- name: Check if kubelet service exists
  ansible.builtin.shell: systemctl list-unit-files | grep -q '^kubelet\.service'
  register: kubelet_service
  changed_when: false
  failed_when: false

- name: Restart kubelet
  ansible.builtin.systemd:
    name: kubelet
    state: restarted
    enabled: yes
    daemon_reload: yes
  when: kubelet_service.rc == 0

# --- Validation of disk pressure fix ---
# FIX: use findmnt -n -o FSTYPE (returns just "ext4") instead of "mount | grep"
#      which returned the full mount line — the old regex matched "tmpfs" inside
#      that string even when the check ran after a successful remount.
- name: Check /var/lib/containerd mount fstype
  ansible.builtin.shell: |
    findmnt -n -o FSTYPE /var/lib/containerd 2>/dev/null | head -1 || echo "NOT_MOUNTED"
  register: containerd_mount
  changed_when: false
  become: true

- name: Show /var/lib/containerd mount status
  ansible.builtin.debug:
    msg: "/var/lib/containerd fstype = {{ containerd_mount.stdout }}"

- name: Fail if /var/lib/containerd is on a virtual filesystem
  ansible.builtin.fail:
    msg: >
      /var/lib/containerd fstype is '{{ containerd_mount.stdout }}' — kubelet will report
      InvalidDiskCapacity. Ensure /dev/{{ storage }} is ext4-formatted and mounted.
  when: containerd_mount.stdout in ['NOT_MOUNTED', 'tmpfs', 'squashfs', 'ramfs', 'none']
# END FIX

- name: Verify kubelet evictionHard and imageGC
  ansible.builtin.shell: |
    grep 'evictionHard' /var/lib/kubelet/config.yaml && echo "OK" || echo "MISSING"
  register: kubelet_config_check
  changed_when: false
  become: true

- name: Show kubelet config check
  ansible.builtin.debug:
    msg: "{{ kubelet_config_check.stdout }}"

- name: Fail if /var/lib/containerd is not on a real filesystem
  ansible.builtin.fail:
    msg: "/var/lib/containerd fstype is '{{ containerd_mount.stdout }}' — kubelet will report InvalidDiskCapacity"
  when: containerd_mount.stdout | trim in ['', 'NOT_MOUNTED', 'tmpfs', 'squashfs', 'ramfs', 'none']

- name: Fail if evictionHard is missing from kubelet config
  ansible.builtin.fail:
    msg: "evictionHard not found in /var/lib/kubelet/config.yaml"
  when: '"evictionHard" not in kubelet_config_check.stdout'
