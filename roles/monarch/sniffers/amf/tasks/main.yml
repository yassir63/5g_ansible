---
- name: Get list of pods
  kubernetes.core.k8s_info:
    api_version: v1
    kind: Pod
    namespace: "{{ core }}"
  register: amf_pods
  no_log: true

- name: Build AMF pod list
  set_fact:
    amf_pod_list: >-
      {{
        amf_pods.resources
        | selectattr('metadata.name', 'search', 'amf')
        | list
      }}
  no_log: true

- name: Fail if no AMF pod found
  ansible.builtin.fail:
    msg: "No AMF pod found in namespace={{ core }}"
  when: amf_pod_list | length == 0

- name: Select AMF sniffer interface based on core
  set_fact:
    amf_sniffer_interface: "{{ 'n3' if core == 'open5gs' else 'n2' }}"

- name: Set AMF Redis host
  set_fact:
    amf_redis_host: "{{ redis_host | default('redis') }}"

- name: Inject AMF sniffer ephemeral container
  vars:
    pod_name: "{{ item.metadata.name }}"
    target_container_name: "{{ item.spec.containers[0].name }}"
    existing_ephemeral: "{{ item.spec.ephemeralContainers | default([]) }}"
    existing_ephemeral_names: "{{ existing_ephemeral | map(attribute='name') | list }}"
    amf_ephemeral_container:
      name: amf-sniffer
      image: r2labuser/amf-sniffer:2026w10
      imagePullPolicy: IfNotPresent
      env:
        - name: amf_sniffer_iface
          value: "{{ amf_sniffer_interface }}"
        - name: REDIS_HOST
          value: "{{ amf_redis_host }}"
      targetContainerName: "{{ target_container_name }}"
      stdin: true
      tty: true
      securityContext:
        privileged: true
        allowPrivilegeEscalation: true
        runAsUser: 0
        runAsNonRoot: false
        capabilities:
          add:
            - NET_ADMIN
            - NET_RAW
            - SYS_ADMIN
    amf_patch:
      metadata:
        name: "{{ pod_name }}"
      spec:
        ephemeralContainers: "{{ existing_ephemeral + [amf_ephemeral_container] }}"
  ansible.builtin.shell: |
    kubectl -n {{ core }} patch pod {{ pod_name }} \
      --subresource='ephemeralcontainers' \
      --type='strategic' \
      -p '{{ amf_patch | to_json }}'
  args:
    executable: /bin/bash
  when: "'amf-sniffer' not in existing_ephemeral_names"
  loop: "{{ amf_pod_list }}"
  loop_control:
    label: "{{ item.metadata.name }}"
  register: amf_injection_result
  changed_when: true

- name: Report existing AMF sniffer ephemeral container
  ansible.builtin.debug:
    msg: "AMF sniffer already present in pod {{ item.metadata.name }}, skipping injection."
  when: "'amf-sniffer' in ((item.spec.ephemeralContainers | default([])) | map(attribute='name') | list)"
  loop: "{{ amf_pod_list }}"
  loop_control:
    label: "{{ item.metadata.name }}"