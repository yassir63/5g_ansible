- name: Get list of AMF pods
  kubernetes.core.k8s_info:
    kind: Pod
    namespace: "{{ core }}"
  register: amf_pods
  no_log: true

- name: Select AMF pod name
  set_fact:
    amf_pod: "{{ item.metadata.name }}"
  loop: "{{ amf_pods.resources }}"
  when: item.metadata.name is search('amf')
  no_log: true

