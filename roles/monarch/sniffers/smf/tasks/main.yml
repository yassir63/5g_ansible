- name: Get list of pods
  kubernetes.core.k8s_info:
    kind: Pod
    namespace: "{{ core }}"
  register: core_pods
  no_log: true

- name: Build SMF pod list (any pod name containing 'smf')
  set_fact:
    smf_pod_list: >-
      {{
        core_pods.resources
        | selectattr('metadata.name', 'search', 'smf')
        | map(attribute='metadata.name')
        | list
      }}
  no_log: true

- name: Fail if none found
  fail:
    msg: "No SMF pods found in namespace={{ core }}"
  when: smf_pod_list | length == 0

# --- Install Python on each SMF ---

- name: Install minimal python3 on each SMF
  shell: |
    kubectl -n {{ core }} exec {{ item }} -- bash -c '
      set -euo pipefail

      if command -v python3 >/dev/null 2>&1; then
        python3 --version
        exit 0
      fi

      apt-get update -qq
      DEBIAN_FRONTEND=noninteractive \
        apt-get install -y -qq --no-install-recommends python3 python3-pip tshark

      python3 --version
    '
  loop: "{{ smf_pod_list }}"
  register: smf_install
  changed_when: false

- name: Install redis + pyshark + scapy on each SMF
  shell: |
    kubectl -n {{ core }} exec {{ item }} -- bash -c '
      set -euo pipefail
      python3 -m pip install --no-cache-dir --disable-pip-version-check redis pyshark scapy
    '
  loop: "{{ smf_pod_list }}"
  register: smf_pip_install
  changed_when: false

# --- Copy sniffer script into each SMF pod ---
- name: Copy smf_sniffer.py into each SMF pod
  ansible.builtin.shell: |
    kubectl -n {{ core }} cp \
      ~/monitoring/sliceawareness/smfsniffer/smf_sniffer.py \
      {{ item }}:/tmp/smf_sniffer.py
  loop: "{{ smf_pod_list }}"
  register: smf_sniffer_copy
  changed_when: smf_sniffer_copy.rc == 0

- name: Select SMF sniffer interface based on core
  set_fact:
    smf_sniffer_interface: "{{ 'n4' if core == 'open5gs' else 'eth0' }}"

# --- Start sniffer in background on each SMF pod ---
- name: Start smf_sniffer on each SMF ( {{ smf_sniffer_interface }}, background)
  ansible.builtin.shell: |
    kubectl -n {{ core }} exec {{ item }} -- bash -c '
      nohup python3 /tmp/smf_sniffer.py {{ smf_sniffer_interface }} \
        > /var/log/smf_sniffer_{{ smf_sniffer_interface }}.log 2>&1 &
    '
  loop: "{{ smf_pod_list }}"
  async: 0
  poll: 0
  changed_when: false
